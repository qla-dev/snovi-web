    <style>
      html,
      body {
        margin: 0;

        display: none;

        position: fixed;
        left: 12px;
        right: 12px;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
        z-index: 9999;
        display: none;
        max-height: 38vh;
        overflow: auto;

        border-radius: 16px;
        background: rgba(2, 6, 23, 0.88);
        color: #e5e7eb;

        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        line-height: 1.45;
      }

      .boot-debug-panel.is-visible {
        display: block;
      }

        display: block;
        margin-bottom: 6px;
        color: #c4b5fd;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 10px;
        letter-spacing: 0.18em;

    <script>
      (function () {
        var startedAt = performance.now();
        var events = [];
        var isDebug = /(?:^|[?&])debugLoad=1(?:&|$)/.test(window.location.search);
        var forceTopFrame = 0;

        try {
          window.history.scrollRestoration = 'manual';
        } catch (error) {
          // Older browsers may not support scrollRestoration.
        }

        function forceScrollTop() {
          window.scrollTo(0, 0);
          document.documentElement.scrollTop = 0;
          if (document.body) {
            document.body.scrollTop = 0;
          }
        }

        function forceTopWhileBootShellExists() {
          forceScrollTop();

          if (document.querySelector('.initial-shell')) {
            forceTopFrame = window.requestAnimationFrame(forceTopWhileBootShellExists);
          }
        }

        window.__SNOVI_STOP_BOOT_SCROLL_LOCK__ = function () {
          if (forceTopFrame) {
            window.cancelAnimationFrame(forceTopFrame);
            forceTopFrame = 0;
          }

          forceScrollTop();
        };

        forceScrollTop();
        forceTopFrame = window.requestAnimationFrame(forceTopWhileBootShellExists);

        window.__SNOVI_BOOT_DEBUG__ = isDebug;
        window.__SNOVI_BOOT_MARK__ = function (label, detail) {
          var elapsed = Math.round(performance.now() - startedAt);
          var message = elapsed + 'ms - ' + label + (detail ? ' - ' + detail : '');
          events.push(message);

          var status = document.getElementById('boot-status');
          if (status) {
            status.textContent = label + (detail ? ': ' + detail : '');
          }

          var panel = document.getElementById('boot-debug-panel');
          if (panel) {
            panel.className = 'boot-debug-panel' + (isDebug ? ' is-visible' : '');
            panel.innerHTML = '<strong>Loading debug</strong>' + events.map(function (entry) {
              return '<div>' + entry.replace(/[&<>"']/g, function (char) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
              }) + '</div>';
            }).join('');
          }

          console.log('[snovi boot]', message);
        };

        window.__SNOVI_BOOT_MARK__('HTML painted', 'waiting for JS bundle');
      })();
    </script>
