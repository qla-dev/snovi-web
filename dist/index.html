      .boot-debug-panel {
        position: fixed;

        line-height: 1.45;
        -webkit-backdrop-filter: blur(14px);
        backdrop-filter: blur(14px);
      }

      .boot-debug-panel.is-visible {
        display: block;
      }

      .boot-debug-panel strong {
        display: block;
        margin-bottom: 6px;

    <script>
      (function () {
        var startedAt = performance.now();
        var events = [];
        var isDebug = /(?:^|[?&])debugLoad=1(?:&|$)/.test(window.location.search);

        window.__SNOVI_BOOT_DEBUG__ = isDebug;
        window.__SNOVI_BOOT_MARK__ = function (label, detail) {
          var elapsed = Math.round(performance.now() - startedAt);
          var message = elapsed + 'ms - ' + label + (detail ? ' - ' + detail : '');
          events.push(message);

          var status = document.getElementById('boot-status');
          if (status) {
            status.textContent = label + (detail ? ': ' + detail : '');
          }

          var panel = document.getElementById('boot-debug-panel');
          if (panel) {
            panel.className = 'boot-debug-panel' + (isDebug ? ' is-visible' : '');
            panel.innerHTML = '<strong>Loading debug</strong>' + events.map(function (entry) {
              return '<div>' + entry.replace(/[&<>"']/g, function (char) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
              }) + '</div>';
            }).join('');
          }

          console.log('[snovi boot]', message);
        };

        window.__SNOVI_BOOT_MARK__('HTML painted', 'waiting for JS bundle');
      })();
    </script>
